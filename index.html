<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telecom Murder Board</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1008;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    color: #e8d5b0;
  }

  #svg-container { width: 100%; height: 100%; cursor: grab; }
  #svg-container:active { cursor: grabbing; }

  /* ── Controls ── */
  #controls {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    display: flex;
    gap: 8px;
    align-items: center;
    background: rgba(20,12,4,0.92);
    border: 1px solid #6b4c2a;
    border-radius: 6px;
    padding: 8px 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.7);
  }

  #search-input {
    background: #2a1a08;
    border: 1px solid #6b4c2a;
    border-radius: 4px;
    color: #e8d5b0;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 5px 10px;
    width: 200px;
    outline: none;
  }
  #search-input:focus { border-color: #c8a060; }
  #search-input::placeholder { color: #6b4c2a; }

  .ctrl-sep {
    width: 1px; height: 20px;
    background: #3a2a10;
    flex-shrink: 0;
  }

  .filter-btn {
    background: #2a1a08;
    border: 1px solid #6b4c2a;
    border-radius: 4px;
    color: #c8a060;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 5px 10px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { background: #3a2a10; border-color: #c8a060; }
  .filter-btn.active { background: #c8a060; color: #1a0e04; border-color: #c8a060; }

  /* galaxy button gets its own accent */
  .galaxy-btn {
    background: #0d1a10;
    border: 1px solid #2a5a30;
    color: #4ade80;
  }
  .galaxy-btn:hover { background: #132018; border-color: #4ade80; }
  .galaxy-btn.active { background: #4ade80; color: #061008; border-color: #4ade80; }

  #progress-text {
    font-size: 13px;
    color: #8a6a40;
    white-space: nowrap;
    min-width: 90px;
  }

  /* ── Sidebar ── */
  #tooltip {
    position: fixed;
    right: 14px;
    top: 12px;
    width: 320px;
    background: rgba(12,8,3,0.97);
    border: 1px solid #6b4c2a;
    border-radius: 6px;
    padding: 14px;
    z-index: 300;
    display: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.8);
    max-height: 85vh;
    overflow-y: auto;
  }
  #tooltip h3 { font-size: 18px; color: #f0c060; margin-bottom: 6px; line-height: 1.3; }
  #tooltip .cat-badge {
    display: inline-block; font-size: 13px; padding: 2px 7px;
    border-radius: 10px; margin-bottom: 8px; font-weight: bold; letter-spacing: 0.5px;
  }
  #tooltip .desc { font-size: 15px; color: #b09070; line-height: 1.6; margin-bottom: 10px; }
  #tooltip .connections-title {
    font-size: 13px; color: #8a6a40; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 6px;
    border-top: 1px solid #3a2a10; padding-top: 8px;
  }
  #tooltip .conn-item {
    font-size: 14px; color: #c8a060; padding: 3px 0;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
  }
  #tooltip .conn-item:hover { color: #f0c060; }
  #tooltip .conn-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  #tooltip .conn-label { font-size: 12px; opacity: 0.6; font-style: italic; }
  #learn-btn {
    width: 100%; margin-top: 10px; padding: 7px;
    background: #2a1a08; border: 1px solid #6b4c2a; border-radius: 4px;
    color: #c8a060; cursor: pointer;
    font-family: 'Courier New', monospace; font-size: 15px; transition: all 0.15s;
  }
  #learn-btn:hover { background: #3a2810; }
  #learn-btn.learned { background: #1a3a10; border-color: #4a8a30; color: #80c050; }

  /* ── Legend ── */
  #legend {
    position: fixed;
    bottom: 12px; left: 12px;
    background: rgba(12,8,3,0.92);
    border: 1px solid #6b4c2a;
    border-radius: 6px;
    padding: 10px 14px;
    z-index: 200;
    max-width: 620px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 13px; color: #8a6a40;
    cursor: pointer; transition: color 0.15s;
  }
  .legend-item:hover { color: #e8d5b0; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* ── Panel toggles ── */
  .panel-header {
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; user-select: none; color: #8a6a40; gap: 12px;
  }
  .panel-header:hover { color: #c8a060; }
  .panel-header strong { color: inherit; }
  #path-hint-body { margin-top: 6px; }
  #legend-arrow, #path-hint-arrow { font-size: 11px; opacity: 0.7; }

  /* ── SVG node styles ── */
  .node-card { cursor: pointer; transition: opacity 0.2s; }
  .node-card.learned rect { stroke-dasharray: none !important; }
  .link-line { transition: opacity 0.2s; }

  /* ── Tips ── */
  #path-hint {
    position: fixed;
    bottom: 12px; right: 14px;
    background: rgba(12,8,3,0.92);
    border: 1px solid #3a2a10;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 14px;
    color: #6b4c2a;
    z-index: 200;
    max-width: 260px;
    line-height: 1.6;
  }
  #path-hint strong { color: #8a6a40; }

  #reset-btn {
    position: fixed; top: 60px; left: 12px;
    background: rgba(20,12,4,0.85);
    border: 1px solid #3a2a10; border-radius: 4px;
    color: #6b4c2a; cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 11px; padding: 5px 9px; z-index: 200; transition: all 0.15s;
  }
  #reset-btn:hover { border-color: #6b4c2a; color: #c8a060; }
</style>
</head>
<body>

<div id="controls">
  <span style="font-size:12px;color:#8a6a40">🔍</span>
  <input id="search-input" type="text" placeholder="Search concepts…" />
  <button class="filter-btn active" id="btn-all"      onclick="filterCategory('all')">All</button>
  <button class="filter-btn"        id="btn-learned"  onclick="filterCategory('learned')">Learned</button>
  <button class="filter-btn"        id="btn-unlearned"onclick="filterCategory('unlearned')">To Learn</button>
  <div class="ctrl-sep"></div>
  <button class="filter-btn galaxy-btn" id="btn-galaxy" onclick="toggleGalaxyView()">✦ Galaxy</button>
  <span id="progress-text">0 / 0 learned</span>
</div>

<button id="reset-btn" onclick="resetView()">↺ Reset view</button>

<div id="tooltip">
  <h3 id="tt-title"></h3>
  <span id="tt-badge" class="cat-badge"></span>
  <p id="tt-desc" class="desc"></p>
  <div id="tt-connections"></div>
  <button id="learn-btn" onclick="toggleLearned()">Mark as Learned</button>
</div>

<div id="legend"></div>

<div id="path-hint">
  <div class="panel-header" onclick="togglePanel('path-hint')">
    <strong>Tips</strong><span id="path-hint-arrow">▾</span>
  </div>
  <div id="path-hint-body">
    Click a node to explore connections.<br>
    Double-click to focus &amp; zoom.<br>
    Drag to pan · Scroll to zoom.
  </div>
</div>

<svg id="svg-container"></svg>

<script>
// ════════════════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════════════════

const CATEGORIES = {
  fundamentals:   { label: "Fundamentals",         color: "#4a9eff" },
  sms:            { label: "SMS & Messaging",       color: "#ff7f50" },
  infrastructure: { label: "Infrastructure",        color: "#a78bfa" },
  ai:             { label: "AI & Voice Tech",       color: "#34d399" },
  business:       { label: "Business Models",       color: "#fbbf24" },
  regulatory:     { label: "Regulatory & Legal",    color: "#f87171" },
  privacy:        { label: "Privacy & Compliance",  color: "#fb923c" },
  market:         { label: "Market & Industry",     color: "#60a5fa" },
  standards:      { label: "Standards & Protocols", color: "#c084fc" },
  tools:          { label: "Dev Tools",             color: "#4ade80" },
};

const REL_COLORS = {
  requires:   "#4a9eff",
  enables:    "#34d399",
  regulates:  "#f87171",
  implements: "#c084fc",
  competes:   "#fbbf24",
  part_of:    "#fb923c",
  related:    "#8a8a8a",
};

const nodes = [
  // FUNDAMENTALS
  { id:"voip",           label:"VoIP",                      cat:"fundamentals",   desc:"Voice over Internet Protocol — transmitting voice calls as data packets over IP networks instead of traditional circuit-switched PSTN lines." },
  { id:"sip",            label:"SIP",                       cat:"fundamentals",   desc:"Session Initiation Protocol — the dominant signaling protocol for initiating, maintaining, and terminating VoIP calls and multimedia sessions." },
  { id:"sip_trunking",   label:"SIP Trunking",              cat:"fundamentals",   desc:"Connecting a business PBX to the PSTN via an IP connection using SIP. Replaces traditional PRI/T1 lines with internet-based trunks." },
  { id:"pstn",           label:"PSTN",                      cat:"fundamentals",   desc:"Public Switched Telephone Network — the legacy global circuit-switched telephone system built on copper wires and SS7 signaling." },
  { id:"pbx",            label:"PBX",                       cat:"fundamentals",   desc:"Private Branch Exchange — a business phone system that switches calls between internal extensions and connects to outside lines." },
  { id:"cloud_pbx",      label:"Cloud PBX",                 cat:"fundamentals",   desc:"A PBX hosted in the cloud rather than on-premise. Eliminates hardware maintenance; provider manages updates and redundancy." },
  { id:"did",            label:"DID",                       cat:"fundamentals",   desc:"Direct Inward Dialing — a service allowing direct calls to individual extensions without going through a receptionist. Mapped to E.164 numbers." },
  { id:"number_prov",    label:"Number Provisioning",       cat:"fundamentals",   desc:"The process of acquiring and configuring telephone numbers from carriers or number administrators (NANPA) for use in a telecom system." },
  { id:"lnp",            label:"LNP / Number Porting",      cat:"fundamentals",   desc:"Local Number Portability — FCC-mandated right to keep your phone number when switching carriers. Critical for VoIP providers to support." },
  { id:"tollfree",       label:"Toll-free Numbers",         cat:"fundamentals",   desc:"Numbers prefixed 800/888/877 etc. where the called party pays. Requires RespOrg designation and special routing through the PSTN." },
  { id:"e164",           label:"E.164 Formatting",          cat:"fundamentals",   desc:"The ITU standard for international phone number formatting: +[country code][subscriber number], e.g. +15551234567. Universal format for VoIP." },
  { id:"dtmf",           label:"DTMF",                      cat:"fundamentals",   desc:"Dual-Tone Multi-Frequency — the touch-tone signaling system. Each key generates two simultaneous audio tones. Used by IVR systems to detect input." },
  { id:"ivr",            label:"IVR",                       cat:"fundamentals",   desc:"Interactive Voice Response — automated phone menus that let callers navigate options via DTMF or voice. Backbone of call center self-service." },
  { id:"acd",            label:"ACD",                       cat:"fundamentals",   desc:"Automatic Call Distribution — routes incoming calls to the appropriate agent or queue based on rules (skills, availability, priority)." },
  { id:"call_routing",   label:"Call Routing",              cat:"fundamentals",   desc:"Rules-based logic determining how calls are directed — by time of day, caller ID, IVR selection, agent skills, or geographic region." },
  { id:"failover",       label:"Failover Routing",          cat:"fundamentals",   desc:"Automatic rerouting of calls to a backup destination if the primary path fails. Critical for SLA compliance and uptime guarantees." },
  { id:"latency_jitter", label:"Latency & Jitter",          cat:"fundamentals",   desc:"Latency = delay in packet delivery. Jitter = variation in that delay. Both degrade voice quality. Target: <150ms one-way, <30ms jitter." },
  { id:"codecs",         label:"Codecs (G.711/G.729/Opus)", cat:"fundamentals",   desc:"Audio compression algorithms. G.711 = uncompressed, best quality. G.729 = compressed, low bandwidth. Opus = modern, adaptive, ideal for WebRTC." },
  { id:"rtp",            label:"RTP",                       cat:"fundamentals",   desc:"Real-time Transport Protocol — carries the actual audio/video data in VoIP calls. Works alongside RTCP for quality monitoring." },
  { id:"webrtc",         label:"WebRTC",                    cat:"fundamentals",   desc:"Web Real-Time Communication — browser-native API for peer-to-peer voice, video, and data. Enables softphones without plugins. Uses ICE/STUN/TURN." },
  // SMS
  { id:"a2p",            label:"A2P SMS",                   cat:"sms",            desc:"Application-to-Person messaging — automated texts sent by businesses to consumers (alerts, OTPs, marketing). Subject to 10DLC registration and TCPA." },
  { id:"p2p",            label:"P2P SMS",                   cat:"sms",            desc:"Person-to-Person messaging — human-to-human texting. Carriers monitor for bot-like patterns and convert P2P traffic detected as A2P." },
  { id:"10dlc",          label:"10DLC Registration",        cat:"sms",            desc:"10-Digit Long Code — the US carrier system requiring businesses to register brand and campaign info before sending A2P SMS at scale. Reduces spam." },
  { id:"shortcodes",     label:"Short/Long/TF Codes",       cat:"sms",            desc:"Short codes (5-6 digits) offer highest A2P throughput. Long codes (10DLC) are cheaper. Toll-free SMS is mid-tier option." },
  { id:"tcpa",           label:"TCPA",                      cat:"sms",            desc:"Telephone Consumer Protection Act — US law requiring prior express written consent before sending marketing texts or robocalls. $500–$1500 per violation." },
  { id:"carrier_filter", label:"Carrier Filtering",         cat:"sms",            desc:"Carriers use ML to detect and block spam SMS. Unregistered traffic, URL shorteners, and high send rates trigger filtering." },
  { id:"sms_agg",        label:"SMS Aggregators",           cat:"sms",            desc:"Intermediaries between businesses and mobile carriers. Handle carrier relationships, throughput management, and 10DLC registration." },
  { id:"rcs",            label:"RCS",                       cat:"sms",            desc:"Rich Communication Services — SMS successor with read receipts, typing indicators, images, and buttons. Now supported natively on iOS and Android." },
  { id:"mms",            label:"MMS",                       cat:"sms",            desc:"Multimedia Messaging Service — extends SMS to support images, video, and audio. Lower throughput than SMS; separate content-type handling in APIs." },
  // INFRASTRUCTURE
  { id:"cpaas",          label:"CPaaS",                     cat:"infrastructure", desc:"Communications Platform as a Service — cloud APIs for voice, SMS, video. Pay-per-use, no telecom infrastructure needed. Think Twilio, Telnyx, Vonage." },
  { id:"ucaas",          label:"UCaaS",                     cat:"infrastructure", desc:"Unified Communications as a Service — bundles voice, video, messaging, and collaboration. Think RingCentral, Teams Phone, Zoom Phone." },
  { id:"ccaas",          label:"CCaaS",                     cat:"infrastructure", desc:"Contact Center as a Service — cloud-delivered call center platform. Includes ACD, IVR, workforce management. Think Five9, Genesys, NICE." },
  { id:"wholesale_voip", label:"Wholesale VoIP",            cat:"infrastructure", desc:"High-volume IP voice termination and origination sold between carriers. Priced per-minute, traded on exchanges. The plumbing under CPaaS." },
  { id:"tiers",          label:"Tier 1/2/3 Carriers",       cat:"infrastructure", desc:"Tier 1: own global backbone, no transit payments (AT&T, NTT). Tier 2: buy some transit. Tier 3: fully buy transit. Affects cost and quality." },
  { id:"peering",        label:"Peering Agreements",        cat:"infrastructure", desc:"Bilateral agreements between carriers to exchange traffic directly without payment. Reduces latency and cost vs. buying transit." },
  { id:"ss7",            label:"SS7",                       cat:"infrastructure", desc:"Signaling System 7 — the protocol controlling PSTN call setup, routing, and SMS. Legacy but still foundational; notoriously vulnerable to interception." },
  { id:"enum_tech",      label:"ENUM",                      cat:"infrastructure", desc:"E.164 Number Mapping — DNS-based system translating phone numbers into URIs. Enables VoIP carriers to route calls without touching the PSTN." },
  { id:"media_server",   label:"Media Servers",             cat:"infrastructure", desc:"Handle audio/video processing in VoIP — transcoding, recording, conferencing, IVR prompts. Freeswitch and Asterisk are common bases." },
  { id:"sbc",            label:"SBC",                       cat:"infrastructure", desc:"Session Border Controller — sits at the edge of VoIP networks. Enforces security, performs NAT traversal, transcodes, and controls QoS." },
  { id:"softswitch",     label:"Softswitch",                cat:"infrastructure", desc:"Software replacing a hardware telephone switch. Controls call routing between VoIP and PSTN. Class 4 = inter-carrier. Class 5 = end-user features." },
  { id:"asterisk",       label:"Asterisk",                  cat:"infrastructure", desc:"Open-source PBX software by Digium/Sangoma. Hugely popular for building custom VoIP systems. Uses dialplan scripting. Runs on Linux." },
  { id:"freeswitch",     label:"FreeSWITCH",                cat:"infrastructure", desc:"Open-source media server and softswitch. More scalable than Asterisk for carrier use cases. Used by many CPaaS providers internally." },
  { id:"kamailio",       label:"Kamailio",                  cat:"infrastructure", desc:"High-performance open-source SIP proxy and registrar. Can handle millions of calls per second. Used at carrier scale for routing and load balancing." },
  { id:"redundancy",     label:"Redundancy & Failover",     cat:"infrastructure", desc:"Architectural patterns: active-active, active-passive, geographic redundancy. Essential for 99.99% uptime SLAs in telecom." },
  { id:"colocation",     label:"Colo vs Cloud-hosted",      cat:"infrastructure", desc:"Co-location: your hardware in a data center. Cloud-hosted: virtual machines. Colo offers more control and lower latency; cloud offers elasticity." },
  // AI
  { id:"ai_agents",      label:"AI Voice Agents",           cat:"ai",             desc:"Fully automated voice bots that can handle inbound/outbound calls end-to-end using LLMs, STT, and TTS. Replacing traditional IVR for complex flows." },
  { id:"llm_voice",      label:"LLM Integration",           cat:"ai",             desc:"Using large language models (GPT-4, Claude, Gemini) as the 'brain' of a voice agent — interpreting intent, generating responses, managing conversation state." },
  { id:"stt",            label:"STT (Speech-to-Text)",      cat:"ai",             desc:"Converts spoken audio to text. Key providers: Deepgram (fastest, telecom-optimized), OpenAI Whisper (open-source), Google Speech-to-Text, AssemblyAI." },
  { id:"tts",            label:"TTS (Text-to-Speech)",      cat:"ai",             desc:"Converts text to natural-sounding speech. Key providers: ElevenLabs (most natural), PlayHT, Azure Neural TTS, Google WaveNet, LMNT, Cartesia." },
  { id:"nlu",            label:"NLU",                       cat:"ai",             desc:"Natural Language Understanding — extracting intent and entities from speech. Sits between STT output and application logic. Used in IVR modernization." },
  { id:"conv_ai",        label:"Conversational AI",         cat:"ai",             desc:"The broader discipline of building dialogue systems — managing context, state, multi-turn conversations, and fallback handling." },
  { id:"turn_taking",    label:"Turn-taking Detection",     cat:"ai",             desc:"Determining when a caller has finished speaking so the bot can respond. Key latency driver. Uses VAD (Voice Activity Detection) and end-of-utterance models." },
  { id:"interruption",   label:"Interruption Handling",     cat:"ai",             desc:"Detecting when a caller speaks over the bot and gracefully yielding or cutting off the bot's response. Critical for natural-feeling conversations." },
  { id:"sentiment",      label:"Sentiment Analysis",        cat:"ai",             desc:"Analyzing the emotional tone of a call in real-time or post-call. Used for QA scoring, agent coaching, and escalation triggers." },
  { id:"vcon",           label:"vCon Standard",             cat:"ai",             desc:"Virtual Conversation — IETF draft standard for a universal JSON format representing a conversation with transcript, media, metadata, and analysis." },
  { id:"transcription",  label:"Call Transcription",        cat:"ai",             desc:"Converting full calls to text. Real-time: enables live agent assist. Post-call: enables search, compliance, QA. Key differentiator between STT providers." },
  { id:"diarization",    label:"Speaker Diarization",       cat:"ai",             desc:"Identifying and segmenting speakers in a recording ('Speaker 1 said... Speaker 2 said...'). Essential for multi-party call transcription." },
  { id:"webhook_voice",  label:"Webhook Architecture",      cat:"ai",             desc:"How CPaaS platforms notify your application of call events (answer, DTMF, hangup) via HTTP POST. Low latency webhook handling is critical for voice bots." },
  { id:"low_latency",    label:"Low-latency AI Inference",  cat:"ai",             desc:"The race to minimize STT + LLM + TTS round-trip time. Target <500ms end-to-end. Techniques: streaming, edge inference, response pre-generation." },
  { id:"vapi",           label:"Vapi.ai",                   cat:"ai",             desc:"CPaaS-like platform specifically for AI voice agents. Handles telephony, STT, LLM, TTS orchestration in one API. Popular for rapid deployment." },
  { id:"retell",         label:"Retell AI",                 cat:"ai",             desc:"Competitor to Vapi. Focuses on low-latency voice agent infrastructure with pre-built integrations for common LLM/STT/TTS providers." },
  { id:"bland",          label:"Bland AI",                  cat:"ai",             desc:"Outbound AI calling platform. Focus on sales and support automation at scale. Offers simple API for launching outbound campaigns." },
  { id:"deepgram",       label:"Deepgram",                  cat:"ai",             desc:"Leading STT provider for real-time telecom use cases. Offers streaming transcription with <300ms latency, phone-call-optimized models, and diarization." },
  { id:"elevenlabs",     label:"ElevenLabs",                cat:"ai",             desc:"TTS provider known for hyper-realistic voice cloning and synthesis. Offers streaming API. Higher cost; best quality for consumer-facing voice agents." },
  // BUSINESS
  { id:"reseller",       label:"Reseller / White-label",    cat:"business",       desc:"Buying wholesale telecom capacity and reselling it under your own brand. Common in VoIP, UCaaS. Margins depend on volume and differentiation." },
  { id:"mvno",           label:"MVNO",                      cat:"business",       desc:"Mobile Virtual Network Operator — provides mobile service using another carrier's network (AT&T, T-Mobile). Examples: Mint Mobile, Google Fi." },
  { id:"mvne",           label:"MVNE",                      cat:"business",       desc:"Mobile Virtual Network Enabler — provides back-office infrastructure for MVNOs: billing, SIM management, network access. The B2B layer under MVNOs." },
  { id:"var",            label:"VAR",                       cat:"business",       desc:"Value Added Reseller — adds services or customization on top of a carrier's raw product before reselling. Justifies higher margin." },
  { id:"usage_pricing",  label:"Usage-based Pricing",       cat:"business",       desc:"Charging per minute, per message, or per API call. Preferred by developers and startups. CPaaS norm. Aligns cost with value delivered." },
  { id:"flat_pricing",   label:"Flat-rate Pricing",         cat:"business",       desc:"Fixed monthly fee for unlimited or capped usage. Preferred by enterprises for predictability. UCaaS standard (per seat/month)." },
  { id:"mrr",            label:"MRR / ARR",                 cat:"business",       desc:"Monthly/Annual Recurring Revenue — the key SaaS/telecom health metrics. ARR = MRR × 12. Investors care deeply about growth rate and net dollar retention." },
  { id:"churn",          label:"Churn Rate",                cat:"business",       desc:"Percentage of customers or revenue lost per period. In telecom, logo churn (customers) and revenue churn are both tracked. 2-5% monthly is high." },
  { id:"cac_ltv",        label:"CAC & LTV",                 cat:"business",       desc:"Customer Acquisition Cost vs Lifetime Value. Healthy SaaS needs LTV:CAC > 3:1. Telecom has high switching costs — LTV can be very high." },
  { id:"gross_margin",   label:"Gross Margin",              cat:"business",       desc:"Wholesale VoIP has thin margins (5-20%). CPaaS layers software margin on top (50-70%). AI value-add can push blended margins higher." },
  // REGULATORY
  { id:"fcc",            label:"FCC",                       cat:"regulatory",     desc:"Federal Communications Commission — US regulator governing interstate and international communications. Enforces telecom law, licensing, consumer protection." },
  { id:"stir_shaken",    label:"STIR/SHAKEN",               cat:"regulatory",     desc:"Call authentication framework mandated by FCC. Carriers cryptographically sign calls to verify caller ID. Attestation levels: A (full), B (partial), C (gateway)." },
  { id:"robocall_regs",  label:"Robocall Regulations",      cat:"regulatory",     desc:"FCC rules under TRACED Act and Truth in Caller ID Act prohibiting spoofed caller ID, requiring STIR/SHAKEN, and mandating call blocking tools." },
  { id:"traced_act",     label:"TRACED Act",                cat:"regulatory",     desc:"2019 law requiring FCC to mandate STIR/SHAKEN, increasing penalties for illegal robocalls, and establishing inter-agency coordination." },

  adjacency[l[0]].push({ target: l[1], rel: l[2], dir: 'out' });

const linkData = links.map(l => ({ source: l[0], target: l[1], rel: l[2] }));

const simulation = d3.forceSimulation(nodes)
  .force('link',      d3.forceLink(linkData).id(d => d.id).distance(90).strength(0.3))
  .force('charge',    d3.forceManyBody().strength(-280))
  .force('cluster',   () => {
    nodes.forEach(n => {
      const c = clusterPos[n.cat];
      n.vx += (c.x - n.x) * 0.008;
      n.vy += (c.y - n.y) * 0.008;
    });
  })
  .force('collision', d3.forceCollide(58))
  .alphaDecay(0.02);

function selectNode(d) {
  selectedNode = d;
  showTooltip(d);
  highlightConnections(d);
}

function focusNode(d) {
  selectedNode = d;
  showTooltip(d);
  highlightConnections(d);
  const scale = 1.8;
  const tx = width/2  - d.x * scale;
  const ty = height/2 - d.y * scale;
  svg.transition().duration(600).call(
    zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(scale)
  );
}

function clearSelection() {
  selectedNode = null;
  document.getElementById('tooltip').style.display = 'none';
  applyFilters();
}

function highlightConnections(d) {
  const connectedIds = new Set([d.id]);
  adjacency[d.id].forEach(e => connectedIds.add(e.target));
  nodeSel.style('opacity', n => connectedIds.has(n.id) ? 1 : 0.07);
  linkSel.style('opacity', l => {
    const sid = typeof l.source==='object' ? l.source.id : l.source;
    const tid = typeof l.target==='object' ? l.target.id : l.target;
    return (sid===d.id || tid===d.id) ? 0.85 : 0.04;
  });
}

function showTooltip(d) {
  document.getElementById('tt-title').textContent = d.label;
  const badge = document.getElementById('tt-badge');
  badge.textContent = CATEGORIES[d.cat].label;
  badge.style.background = CATEGORIES[d.cat].color + '22';
  badge.style.color = CATEGORIES[d.cat].color;
  badge.style.border = '1px solid ' + CATEGORIES[d.cat].color + '44';
  document.getElementById('tt-desc').textContent = d.desc;

  const conns = adjacency[d.id];
  const connDiv = document.getElementById('tt-connections');
  if (conns.length > 0) {
    let html = '<div class="connections-title">Connections (' + conns.length + ')</div>';
    [...conns].sort((a,b) => a.dir==='out' ? -1 : 1).forEach(e => {
      const other = nodeMap[e.target];
      if (!other) return;
      const rel = e.dir==='out' ? '→ '+e.rel : '← '+e.rel;
      const dot = REL_COLORS[e.rel] || '#888';
      html += `<div class="conn-item" onclick="focusNode(nodeMap['${e.target}'])">
        <span class="conn-dot" style="background:${dot}"></span>
        <span>${other.label}</span>
        <span class="conn-label">${rel}</span>
      </div>`;
    });
    connDiv.innerHTML = html;
  } else { connDiv.innerHTML = ''; }

  const btn = document.getElementById('learn-btn');
  if (learnedSet.has(d.id)) {
    btn.textContent = '✓ Learned — click to undo'; btn.classList.add('learned');
  } else {
    btn.textContent = 'Mark as Learned'; btn.classList.remove('learned');
  }
  document.getElementById('tooltip').style.display = 'block';
}

function toggleLearned() {
  if (!selectedNode) return;
  const id = selectedNode.id;
  learnedSet.has(id) ? learnedSet.delete(id) : learnedSet.add(id);
  saveLearned();
  updateLearnedVisuals();
  showTooltip(selectedNode);
  updateProgress();
}

function updateLearnedVisuals() {
  nodeSel.select('.card-rect')
    .attr('stroke-width',    d => learnedSet.has(d.id) ? 2 : 1)
    .attr('stroke-opacity',  d => learnedSet.has(d.id) ? 1 : 0.6)
    .attr('stroke-dasharray',d => learnedSet.has(d.id) ? 'none' : '3,2');
  nodeSel.select('.learned-fill')
    .attr('fill', d => learnedSet.has(d.id) ? CATEGORIES[d.cat].color : 'transparent');
  nodeSel.select('.node-label')
    .attr('fill', d => learnedSet.has(d.id) ? CATEGORIES[d.cat].color : '#d4b896');
  nodeSel.select('.check-badge')
    .attr('opacity', d => learnedSet.has(d.id) ? 1 : 0);
  nodeSel.classed('learned', d => learnedSet.has(d.id));
}

function updateProgress() {
  document.getElementById('progress-text').textContent =
    learnedSet.size + ' / ' + nodes.length + ' learned';
}

function filterCategory(mode) {
  currentFilter = mode;
  document.querySelectorAll('.filter-btn:not(.galaxy-btn)').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + mode).classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = searchQuery.toLowerCase();
  const showNode = d => {
    if (q && !d.label.toLowerCase().includes(q) && !d.desc.toLowerCase().includes(q)) return false;
    if (currentFilter==='learned'   && !learnedSet.has(d.id)) return false;
    if (currentFilter==='unlearned' &&  learnedSet.has(d.id)) return false;
    return true;
  };
  nodeSel.style('opacity', d => showNode(d) ? 1 : 0.07);
  linkSel.style('opacity', l => {
    const sid = typeof l.source==='object' ? l.source.id : l.source;
    const tid = typeof l.target==='object' ? l.target.id : l.target;
    const s = nodeMap[sid], t = nodeMap[tid];
    if (galaxyMode) {
      if (!showNode(s) || !showNode(t)) return 0.03;
      return NODE_GALAXY[sid] !== NODE_GALAXY[tid] ? 0.55 : 0.12;
    }
    return (s && t && showNode(s) && showNode(t)) ? 0.35 : 0.03;
  });
  if (galaxyMode) updateLinkGalaxyStyles();
}

document.getElementById('search-input').addEventListener('input', function() {
  searchQuery = this.value;
  applyFilters();
});

function dragStart(event, d) {

const GALAXY_META = {
  voip:       { label:'VoIP Core',                hub:'voip',       color:'#4a9eff' },
  regulatory: { label:'Regulatory & Compliance',  hub:'fcc',        color:'#f87171' },
  infra:      { label:'Infrastructure & Economics',hub:'cpaas',     color:'#a78bfa' },
  ai:         { label:'AI & Voice',               hub:'ai_agents',  color:'#34d399' },
  devtools:   { label:'Developer Tools',          hub:'twilio_api', color:'#4ade80' },
};

function getGalaxyCenters() {
  const cx = width  / 2;
  const cy = height / 2;
  const R  = Math.min(width * 0.40, height * 0.52);
  // Pentagon: VoIP top, AI upper-right, DevTools lower-right, Infra lower-left, Reg upper-left
  const order = ['voip', 'ai', 'devtools', 'infra', 'regulatory'];
  const result = {};
  order.forEach((k, i) => {
    const a = (2 * Math.PI * i / 5) - Math.PI / 2;
    result[k] = { x: cx + R * Math.cos(a), y: cy + R * Math.sin(a) };
  });
  return result;
}

function computeGalaxyPositions() {
  const centers   = getGalaxyCenters();
  const positions = {};

  Object.entries(GALAXY_META).forEach(([gkey, gdef]) => {
    const center = centers[gkey];
    positions[gdef.hub] = { x: center.x, y: center.y };

    const orbiters = nodes
      .filter(n => NODE_GALAXY[n.id] === gkey && n.id !== gdef.hub)
      .sort((a, b) => adjacency[b.id].length - adjacency[a.id].length);

    const rings = [
      { r: 100, nodes: orbiters.slice(0, 7)  },
      { r: 182, nodes: orbiters.slice(7, 19) },
      { r: 258, nodes: orbiters.slice(19)    },
    ];

    rings.forEach(ring => {
      ring.nodes.forEach((node, i) => {
        const a = (2 * Math.PI * i / ring.nodes.length) - Math.PI / 2;
        positions[node.id] = {
          x: center.x + ring.r * Math.cos(a),
          y: center.y + ring.r * Math.sin(a),
        };
      });
    });
  });

  return positions;
}

function drawGalaxyBackgrounds(centers) {
  galaxyBgGroup.selectAll('*').remove();

  Object.entries(GALAXY_META).forEach(([gkey, gdef]) => {
    const c = centers[gkey];

    // Outer halo
    galaxyBgGroup.append('circle')
      .attr('cx', c.x).attr('cy', c.y).attr('r', 280)
      .attr('fill', gdef.color).attr('opacity', 0.04)
      .attr('stroke', gdef.color).attr('stroke-width', 1.5)
      .attr('stroke-opacity', 0.18)
      .attr('stroke-dasharray', '6,4');

    // Inner core glow
    galaxyBgGroup.append('circle')
      .attr('cx', c.x).attr('cy', c.y).attr('r', 115)
      .attr('fill', gdef.color).attr('opacity', 0.06);

    // Galaxy name label
    galaxyBgGroup.append('text')
      .attr('x', c.x).attr('y', c.y - 295)
      .attr('text-anchor', 'middle')
      .attr('font-size', '12px')
      .attr('font-family', 'Courier New, monospace')
      .attr('fill', gdef.color).attr('opacity', 0.6)
      .attr('letter-spacing', '2.5px')
      .text(gdef.label.toUpperCase());
  });
}

function updateLinkGalaxyStyles() {
  linkSel
    .attr('stroke-opacity', l => {
      const sid = typeof l.source==='object' ? l.source.id : l.source;
      const tid = typeof l.target==='object' ? l.target.id : l.target;
      return NODE_GALAXY[sid] !== NODE_GALAXY[tid] ? 0.55 : 0.12;
    })
    .attr('stroke-dasharray', l => {
      const sid = typeof l.source==='object' ? l.source.id : l.source;
      const tid = typeof l.target==='object' ? l.target.id : l.target;
      return NODE_GALAXY[sid] !== NODE_GALAXY[tid] ? '5,4' : null;
    });
}

function resetLinkStyles() {
  linkSel.attr('stroke-opacity', 0.35).attr('stroke-dasharray', null);
}

// Smooth animation without fighting the force simulation
function animateNodes(targetPositions, duration, onDone) {
  simulation.stop();
  const t0    = performance.now();
  const start = {};
  nodes.forEach(n => { start[n.id] = { x: n.x, y: n.y }; });

  function tick(now) {
    const pct  = Math.min(1, (now - t0) / duration);
    const ease = pct < 0.5 ? 2*pct*pct : 1 - Math.pow(-2*pct+2,2)/2;

    nodes.forEach(n => {
      const s = start[n.id];
      const t = targetPositions[n.id] || s;
      n.x = s.x + (t.x - s.x) * ease;
      n.y = s.y + (t.y - s.y) * ease;
    });

    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
    linkSel.attr('x1',l=>l.source.x).attr('y1',l=>l.source.y)
           .attr('x2',l=>l.target.x).attr('y2',l=>l.target.y);

    if (pct < 1) { requestAnimationFrame(tick); }
    else { onDone && onDone(); }
  }
  requestAnimationFrame(tick);
}

function enterGalaxyView() {
  clearSelection();
  const positions = computeGalaxyPositions();
  const centers   = getGalaxyCenters();

  drawGalaxyBackgrounds(centers);

  animateNodes(positions, 900, () => {
    // Fix all nodes in place
    nodes.forEach(n => {
      const p = positions[n.id];
      if (p) { n.fx = p.x; n.fy = p.y; n.x = p.x; n.y = p.y; }
    });
    simulation.alpha(0).restart();
    updateLinkGalaxyStyles();

    // Zoom to fit the pentagon + outer halos
    const R     = Math.min(width * 0.40, height * 0.52) + 300;
    const scale = Math.min(width, height) / (2 * R) * 0.92;
    const tx    = (width  - scale * width)  / 2;
    const ty    = (height - scale * height) / 2;
    svg.transition().duration(600).call(
      zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale)
    );
  });
}

function exitGalaxyView() {
  clearSelection();
  galaxyBgGroup.selectAll('*').remove();
  nodes.forEach(n => { n.fx = null; n.fy = null; });
  resetLinkStyles();
  simulation.alpha(0.5).restart();
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity);
}

function toggleGalaxyView() {
  galaxyMode = !galaxyMode;
  document.getElementById('btn-galaxy').classList.toggle('active', galaxyMode);
  galaxyMode ? enterGalaxyView() : exitGalaxyView();
}
